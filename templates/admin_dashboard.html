<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("{{ url_for('static', filename='cow.jpg') }}") no-repeat center center/cover;
        }

        /* BLUR OVERLAY */
        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(6px);
            background: rgba(0,0,0,0.4);
            top: 0;
            left: 0;
        }

        /* MAIN CARD */
        .container {
            position: relative;
            z-index: 2;
            width: 80%;
            margin: 50px auto;
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            padding: 10px;
            border: 1px solid #ccc;
        }

        th {
            background: #2c3e50;
            color: white;
        }

        tr:nth-child(even) {
            background: #f4f6f9;
        }

        .logout {
            margin-top: 20px;
            display: inline-block;
            padding: 10px 15px;
            background: red;
            color: white;
            border-radius: 8px;
            text-decoration: none;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="container">

    <h1>🔑 Admin Dashboard</h1>

    <h2>Registered Users</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Password</th>
        </tr>

        {% for user in users %}
        <tr>
            <td>{{ user[0] }}</td>
            <td>{{ user[1] }}</td>
            <td>{{ user[2] }}</td>
        </tr>
        {% endfor %}
    </table>

    <a href="/logout" class="logout">Logout</a>

</div>

</body>
</html>
