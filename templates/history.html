<h1>Prediction History</h1>

<table border="1">
<tr>
    <th>User</th>
    <th>Animal</th>
    <th>Disease</th>
    <th>Confidence</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}%</td>
</tr>
{% endfor %}
</table>
