<!DOCTYPE html>
<html>
<head>
    <title>Sign Up</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("{{ url_for('static', filename='sheep.jpg') }}") no-repeat center center/cover;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(5px);
            background: rgba(0,0,0,0.4);
        }

        .box {
            position: relative;
            z-index: 2;
            width: 320px;
            margin: 100px auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            text-align: center;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: green;
            color: white;
            border: none;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<h1 style="text-align:center; color:white;">🐄 JeevTrack</h1>

<div class="box">

<h2>Create Account</h2>

<form method="POST" action="/signup">

    <input type="email" name="email" placeholder="Email" required>
    <input type="password" name="password" placeholder="Password" required>

    <button type="submit">Register</button>

</form>

<p>Already have account? <a href="/login">Login</a></p>

</div>

</body>
</html>
