<!DOCTYPE html>
<html>
<head>
    <title>Statistics</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #f4f6f9;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .container {
            width: 90%;
            margin: auto;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body>

<h1>📊 Livestock Statistics Dashboard</h1>

<div class="container">

    <div class="grid">

        <!-- Animal vs Disease -->
        <div class="card">
            <h3>Animal vs Disease</h3>
            <canvas id="chart1"></canvas>
        </div>

        <!-- Disease vs Risk -->
        <div class="card">
            <h3>Disease Risk Level</h3>
            <canvas id="chart2"></canvas>
        </div>

        <!-- Disease vs Death -->
        <div class="card">
            <h3>Disease vs Death Rate (%)</h3>
            <canvas id="chart3"></canvas>
        </div>

        <!-- Animal Death Over Years -->
        <div class="card">
            <h3>Animal Death Over Years</h3>
            <canvas id="chart4"></canvas>
        </div>

        <!-- App Performance -->
        <div class="card">
            <h3>App Performance</h3>
            <canvas id="chart5"></canvas>
        </div>

    </div>

</div>

<script>

// 1. Animal vs Disease
new Chart(document.getElementById("chart1"), {
    type: 'bar',
    data: {
        labels: ["Cow", "Goat", "Sheep", "Buffalo", "Hen"],
        datasets: [{
            label: "Disease Cases",
            data: [50, 30, 25, 40, 60],
        }]
    }
});

// 2. Disease vs Risk
new Chart(document.getElementById("chart2"), {
    type: 'pie',
    data: {
        labels: ["Lumpy", "FMD", "PPR", "Bird Flu"],
        datasets: [{
            data: [90, 85, 60, 95]
        }]
    }
});

// 3. Disease vs Death
new Chart(document.getElementById("chart3"), {
    type: 'bar',
    data: {
        labels: ["Lumpy", "FMD", "PPR", "Bird Flu"],
        datasets: [{
            label: "Death %",
            data: [20, 30, 15, 40]
        }]
    }
});

// 4. Animal Death Over Years
new Chart(document.getElementById("chart4"), {
    type: 'line',
    data: {
        labels: ["2020", "2021", "2022", "2023", "2024"],
        datasets: [{
            label: "Deaths %",
            data: [10, 15, 25, 20, 18],
            fill: false
        }]
    }
});

// 5. App Performance
new Chart(document.getElementById("chart5"), {
    type: 'line',
    data: {
        labels: ["2020", "2021", "2022", "2023", "2024"],
        datasets: [{
            label: "Accuracy %",
            data: [60, 70, 80, 85, 92],
            fill: false
        }]
    }
});

</script>

</body>
</html>
