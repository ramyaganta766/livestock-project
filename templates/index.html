<!DOCTYPE html>
<html>
<head>
    <title>Login</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: url("{{ url_for('static', filename='cow.jpg') }}") no-repeat center center/cover;
        }

        .overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(5px);
            background: rgba(0,0,0,0.4);
        }

        .login-box {
            position: relative;
            z-index: 2;
            width: 320px;
            margin: 120px auto;
            background: white;
            padding: 25px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1 {
            color: #2c3e50;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
        }

        button {
            width: 100%;
            padding: 10px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 6px;
        }

        a {
            text-decoration: none;
            color: blue;
        }
    </style>
</head>

<body>

<div class="overlay"></div>

<div class="login-box">

    <!-- ✅ APP NAME -->
    <h1>🐄 Livestock Health System</h1>

    <h2>Login</h2>

    <form method="POST" action="/login">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <!-- ✅ SIGNUP OPTION -->
    <p>New user? <a href="/signup">Sign Up</a></p>

</div>

</body>
</html>
